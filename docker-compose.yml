services:
  app:
    build: .
    container_name: one-dice-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: one-dice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: onedice
      POSTGRES_USER: onedice
      POSTGRES_PASSWORD: troque_essa_senha
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onedice -d onedice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
