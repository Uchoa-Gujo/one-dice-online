<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>One Dice OBS</title>
  <link rel="stylesheet" href="/obs.css?v=95" />
</head>
<body>
  <main id="obs-root" class="obs-root" data-status="loading">
    <section id="obs-hud" class="od-obs-hud" aria-label="Status do personagem">
      <div id="obs-portrait-box" class="od-obs-photo-box">
        <img id="obs-portrait" class="od-obs-photo" src="/assets/logo.jpg" alt="" draggable="false" />
      </div>

      <div class="od-obs-bars">
        <div class="od-obs-bar od-obs-bar-pv" aria-label="Pontos de Vida">
          <div id="obs-pv-fill" class="od-obs-fill"></div>
          <div class="od-obs-text">
            <span>PV</span>
            <strong id="obs-pv-text">0 / 0</strong>
          </div>
        </div>

        <div class="od-obs-bar od-obs-bar-pe" aria-label="Pontos de Esforço">
          <div id="obs-pe-fill" class="od-obs-fill"></div>
          <div class="od-obs-text">
            <span>PE</span>
            <strong id="obs-pe-text">0 / 0</strong>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="/obs.js?v=95" defer></script>
</body>
</html>
